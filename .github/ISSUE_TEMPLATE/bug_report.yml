name: Bug report
description: Report a reproducible problem in flipcard.
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please provide enough detail for us to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen.
      placeholder: A clear and concise description of the problem.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Share the smallest reproducible sequence.
      placeholder: |
        1. Install dependencies
        2. Run ...
        3. Open ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share versions, browser, OS, package, and runtime details.
      placeholder: Node 20, npm 10, Windows 11, Chrome 135, package version 0.1.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      render: shell
