name: Feature request
description: Suggest an idea or enhancement for flipcard.
title: '[Feature]: '
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. Help us understand the problem and the desired outcome.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: As a builder, I want...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the shape of the feature or API you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workarounds or alternatives you evaluated.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, screenshots, links, or schema ideas.
