name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build:libs
      - name: Build documentation site
        working-directory: docs
        env:
          GITHUB_PAGES: 'true'
        run: |
          npm ci
          npm run build
      - run: GITHUB_PAGES=true npm run build:showcase
        env:
          GITHUB_PAGES: 'true'
      - run: npm run build:storybook
      - name: Compose deploy site
        run: |
          mkdir -p _site
          cp -r docs/build/* _site/
          mkdir -p _site/showcase
          cp -r apps/showcase/dist/* _site/showcase/
          mkdir -p _site/storybook
          cp -r storybook-static/* _site/storybook/
          node --input-type=module -e 'import { mkdirSync, writeFileSync } from "node:fs"; import { flipCardManifestSchema } from "./packages/core/dist/schema.js"; mkdirSync("_site/schema", { recursive: true }); writeFileSync("_site/schema/v0.1.json", JSON.stringify(flipCardManifestSchema, null, 2) + "\n");'
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
